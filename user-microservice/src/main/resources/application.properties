server.port=8081
spring.application.name=user-microservice
# URL de conexão (localhost porque o container mapeou a porta 5432 para a sua máquina)
spring.datasource.url=jdbc:postgresql://localhost:5432/mps_user_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' cria as tabelas automaticamente baseado nas suas @Entity (UserEntity, AddressEntity)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

